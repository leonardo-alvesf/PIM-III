<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechLearn — Perfil</title>

    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../styles/components/nav.css">
    <link rel="stylesheet" href="../styles/layouts/layout.css">
    <link rel="stylesheet" href="../styles/pages/perfil.css">
</head>
<body>

    <div class="pagina">

        <header class="cabecalho-pagina">
            <h1>Perfil</h1>
        </header>

        <main class="pagina-com-nav">
            <section class="area-conteudo" aria-label="Perfil do usuário">

                <div class="card" style="margin-bottom: 16px;" id="card-usuario">

                    <div id="perfil-view" class="card-usuario">
                        <div class="avatar" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                        <div class="usuario-dados">
                            <p class="usuario-nome" id="exibir-nome">Usuário Exemplo</p>
                            <p class="usuario-email" id="exibir-email">userexemplo@email.com</p>
                        </div>
                        <button class="btn-editar" type="button"
                                id="btn-abrir-edicao" aria-label="Editar perfil">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                        </button>
                    </div>

                    <form id="perfil-edit" style="display: none;" aria-label="Editar dados do perfil">

                        <div class="edit-usuario-resumo">
                            <div class="avatar" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                            <div>
                                <p class="usuario-nome" id="edit-nome-resumo">Usuário Exemplo</p>
                                <p class="usuario-email" id="edit-email-resumo">gamekfodk@gmail.com</p>
                            </div>
                        </div>

                        <div class="edit-campo-grupo">
                            <label for="input-nome">Nome</label>
                            <div class="edit-campo-input">
                                <input type="text" id="input-nome"
                                       value="Usuário Exemplo" autocomplete="name">
                            </div>
                        </div>

                        <div class="edit-campo-grupo">
                            <label for="input-email">E-mail</label>
                            <div class="edit-campo-input">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                     aria-hidden="true">
                                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                                    <polyline points="2,8 12,14 22,8"/>
                                </svg>
                                <input type="email" id="input-email"
                                       value="gamekfodk@gmail.com" autocomplete="email">
                            </div>
                        </div>

                        <div class="edit-botoes">

                            <button type="button" class="btn-salvar" id="btn-salvar">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                     aria-hidden="true">
                                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                                    <polyline points="17 21 17 13 7 13 7 21"/>
                                    <polyline points="7 3 7 8 15 8"/>
                                </svg>
                                Salvar
                            </button>

                            <button type="button" class="btn-cancelar-edit" id="btn-cancelar">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                     aria-hidden="true">
                                    <line x1="18" y1="6" x2="6" y2="18"/>
                                    <line x1="6" y1="6" x2="18" y2="18"/>
                                </svg>
                                Cancelar
                            </button>

                        </div>

                </form>

                </div>
                <div class="card" style="margin-bottom: 16px;">
                    <h2 class="acesso-rapido-titulo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        </svg>
                        Acesso Rápido
                    </h2>
                    <a href="cursos.html" class="btn-acesso btn-acesso-azul">
                        Ver todos os cursos
                    </a>
                    <a href="simulados.html" class="btn-acesso btn-acesso-verde">
                        Fazer simulado
                    </a>
                </div>

                <a href="../index.html" class="btn-sair">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Sair da conta
                </a>

            </section>
        </main>

        <nav class="nav-inferior" aria-label="Menu principal">

            <a href="home.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Início</span>
            </a>

            <a href="cursos.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                <span>Cursos</span>
            </a>

            <a href="simulados.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <span>Simulados</span>
            </a>

            <a href="perfil.html" class="ativo" aria-current="page">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Perfil</span>
            </a>

        </nav>

        <script src="../scripts/app.js"></script>

    </div>

</body>
</html>
