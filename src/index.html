<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechLearn — Entrar</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="styles/pages/login.css">
</head>
<body>

    <div class="pagina">

        <main class="pagina-login">

            <p class="login-logo">TechLearn</p>
            <h1 class="login-titulo">Bem-vindo de volta</h1>
            <p class="login-subtitulo">Entre para continuar seus estudos</p>

            <section class="card-login">

                <form action="#" novalidate>

                    <div class="campo-grupo">
                        <label for="email">E-mail</label>
                        <div class="campo-input">
                            <!-- Ícone de email -->
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                 aria-hidden="true">
                                <rect x="2" y="4" width="20" height="16" rx="2"/>
                                <polyline points="2,8 12,14 22,8"/>
                            </svg>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="seu@email.com"
                                autocomplete="email"
                            >
                        </div>
                    </div>

                    <div class="campo-grupo">
                        <label for="senha">Senha</label>
                        <div class="campo-input">
                            <!-- Ícone de senha -->
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                 aria-hidden="true">
                                <rect x="3" y="11" width="18" height="11" rx="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input
                                type="password"
                                id="senha"
                                name="senha"
                                placeholder="••••••••"
                                autocomplete="current-password"
                            >
                        </div>
                    </div>

                    <a href="pages/recuperar-senha.html" class="link-esqueceu">Esqueceu a senha?</a>

                    <button
                        type="button"
                        class="btn-entrar"
                        onclick="window.location.href='pages/home.html'"
                    >
                        Entrar &rarr;
                    </button>

                </form>

                <p class="login-rodape">
                    Não tem uma conta? <a href="pages/criar-conta.html">Criar conta</a>
                </p>

            </section>

        </main>

    </div>

</body>
</html>
